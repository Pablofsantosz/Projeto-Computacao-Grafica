<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Space Invaders - Estrutura Estática</title>
    <style>
        body { 
            background-color: #222; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 200vh; 
            margin: 0; 
        }
        canvas { 
            background-color: #000; 
            border: 100px solid #555; 
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="440" height="350"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 1. Definição da Nave (Ship)
        // Apenas as propriedades de posição e tamanho
        const ship = {
            x: 10,    // Posição horizontal
            y: 310,    // Posição vertical
            width: 20,
            height: 16
        };

        // 2. Definição dos Inimigos (Invaders)
        // Criamos uma lista (array) e preenchemos com objetos
        let invaders = [];
        const rows = 4; // Quantidade de linhas
        const cols = 9; // Quantidade de colunas

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                invaders.push({
                    x: 45 + (c * 40), // Espaçamento horizontal
                    y: 40 + (r * 30), // Espaçamento vertical
                    width: 25,
                    height: 18
                });
            }
        }

        // 3. Função de Desenho (Renderização)
        // Esta função apenas "pinta" o que foi definido acima
        function draw() {
            // Limpa o fundo para não sobrepor desenhos
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar a Nave
            ctx.fillStyle = '#BBB'; // Cor cinza
            ctx.fillRect(ship.x, ship.y, ship.width, ship.height);

            // Desenhar os Inimigos
            ctx.fillStyle = '#00FF00'; // Cor verde
            invaders.forEach(inv => {
                ctx.fillRect(inv.x, inv.y, inv.width, inv.height);
            });
        }

        // Executa o desenho uma única vez
        draw();
    </script>
</body>
</html>
