<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Defesa Planetária - Projeto 2D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let tempo = 0; 

        function desenhaQuadrado(tamanho, cor) {
            ctx.fillStyle = cor;
            
            ctx.fillRect(-tamanho/2, -tamanho/2, tamanho, tamanho); 
        }

        function desenhaCirculo(raio, cor) {
            ctx.beginPath();
           
            ctx.arc(0, 0, raio, 0, Math.PI * 2); 
            ctx.fillStyle = cor;
            ctx.fill();
        }

        function animar() { 
            ctx.setTransform(1, 0, 0, 1, 0, 0); 
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(100, 100); 
            desenhaQuadrado(50, 'red');
            ctx.restore();

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2); 
            desenhaCirculo(30, 'yellow');
            ctx.restore();

            requestAnimationFrame(animar);

            tempo += 0.016;
            requestAnimationFrame(animar); 
        }

        animar();
    </script>
</body>
</html>
