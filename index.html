<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Space Invaders - 4 Linhas</title>
    <style>
        body { background-color: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: Arial, sans-serif; flex-direction: column; }
        canvas { background-color: #000; border: 2px solid #555; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .hud { margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="hud">
       </b> Use ◄ ► e ESPAÇO<br>
        
    </div>

    <canvas id="gameCanvas" width="440" height="350"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const KEY_LEFT = 37, KEY_RIGHT = 39, KEY_SPACE = 32;
        let pressedKeys = {};
        let rockets = [];

        const ship = {
            x: canvas.width / 2 - 10,
            y: canvas.height - 30,
            width: 22,
            height: 16,
            speed: 200
        };

        
        let invaders = [];
        const rows = 4; 
        const cols = 9;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                let randomHealth = Math.floor(Math.random() * 4) + 1;
                invaders.push({
                    x: 45 + (c * 40),
                    y: 40 + (r * 30),
                    width: 25,
                    height: 18,
                    health: randomHealth,
                    alive: true
                });
            }
        }

        window.addEventListener('keydown', e => pressedKeys[e.keyCode] = true);
        window.addEventListener('keyup', e => {
            if (e.keyCode === KEY_SPACE) fireRocket();
            delete pressedKeys[e.keyCode];
        });

        function fireRocket() {
            rockets.push({ x: ship.x + ship.width / 2, y: ship.y, speed: 300 });
        }

        function update(dt) {
            if (pressedKeys[KEY_LEFT] && ship.x > 0) ship.x -= ship.speed * dt;
            if (pressedKeys[KEY_RIGHT] && ship.x < canvas.width - ship.width) ship.x += ship.speed * dt;

            for (let i = 0; i < rockets.length; i++) {
                let r = rockets[i];
                r.y -= r.speed * dt;

                if (r.y < 0) {
                    rockets.splice(i, 1);
                    i--;
                    continue;
                }

                for (let j = 0; j < invaders.length; j++) {
                    let inv = invaders[j];
                    if (inv.alive &&
                        r.x > inv.x && r.x < inv.x + inv.width &&
                        r.y > inv.y && r.y < inv.y + inv.height) {
                        
                        inv.health -= 1; 
                        if (inv.health <= 0) inv.alive = false;

                        rockets.splice(i, 1);
                        i--;
                        break; 
                    }
                }
            }
        }

        // Cores baseadas na vida
        function getInvaderColor(health) {
            switch(health) {
                case 4: return '#2E0854';
                case 3: return '#005588'; 
                case 2: return '#00AA00'; 
                case 1: return '#88FF88'; 
                default: return '#FFF';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Nave
            ctx.fillStyle = '#E0E0E0';
            ctx.fillRect(ship.x, ship.y, ship.width, ship.height);

            //  Inimigos
            invaders.forEach(inv => {
                if (inv.alive) {
                    ctx.fillStyle = getInvaderColor(inv.health);
                    ctx.fillRect(inv.x, inv.y, inv.width, inv.height);
                    
                    
                    ctx.fillStyle = "white";
                    ctx.font = "bold 10px Arial";
                    ctx.textAlign = "center";
                    ctx.fillText(inv.health, inv.x + inv.width/2, inv.y + 13);
                }
            });

            // fogo
            ctx.fillStyle = '#FF4444';
            rockets.forEach(r => ctx.fillRect(r.x - 1, r.y, 2, 8));
        }

        let lastTime = performance.now();
        function gameLoop(currentTime) {
            let dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            update(dt);
            draw();
            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
