<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Space Invaders 360 - Victory Edition</title>
    <style>
        body { background-color: #111; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background-color: #000; border: 2px solid #333; box-shadow: 0 0 20px rgba(0,255,255,0.1); }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const LOGICAL_WIDTH = 600;
        const LOGICAL_HEIGHT = 600;

        const KEY_LEFT = 37, KEY_RIGHT = 39, KEY_SPACE = 32;
        let pressedKeys = {};
        let rockets = [];
        let tempo = 0; 
        let gameWon = false; // Estado para controlar a vitória

        // 1. Fundo Espacial Estrelas
        let stars = [];
        for (let i = 0; i < 80; i++) {
            stars.push({
                x: Math.random() * LOGICAL_WIDTH,
                y: Math.random() * LOGICAL_HEIGHT,
                size: Math.random() * 1.5,
                blinkSpeed: 1 + Math.random() * 3
            });
        }

        // 2. Configuração da Nave
        const ship = {
            centerX: LOGICAL_WIDTH / 2,
            centerY: LOGICAL_HEIGHT / 2,
            angle: 0,
            radius: 20,
            speed: 4 
        };

        // 3. Configuração dos Inimigos (Camadas)
        let invaders = [];
        const layers = [
            { count: 8, radius: 120, speed: 0.5 },
            { count: 12, radius: 190, speed: -0.3 },
            { count: 16, radius: 260, speed: 0.2 }
        ];

        layers.forEach((layer, layerIdx) => {
            for (let i = 0; i < layer.count; i++) {
                invaders.push({
                    layerIdx: layerIdx,
                    angleOffset: (i * (Math.PI * 2 / layer.count)),
                    x: 0, y: 0,
                    width: 20, height: 18,
                    health: 4 - layerIdx, 
                    alive: true
                });
            }
        });

        // 4. Redimensionamento da tela 
        let scale = 1;
        function resize() {
            const scaleX = window.innerWidth / LOGICAL_WIDTH;
            const scaleY = window.innerHeight / LOGICAL_HEIGHT;
            scale = Math.min(scaleX, scaleY);
            canvas.width = LOGICAL_WIDTH * scale;
            canvas.height = LOGICAL_HEIGHT * scale;
        }
        window.addEventListener('resize', resize);
        resize();

        // 5. Controles
        window.addEventListener('keydown', e => pressedKeys[e.keyCode] = true);
        window.addEventListener('keyup', e => {
            if (e.keyCode === KEY_SPACE && !gameWon) fireRocket();
            delete pressedKeys[e.keyCode];
        });
        
        // disparos
        function fireRocket() {
            rockets.push({ 
                x: ship.centerX + Math.cos(ship.angle) * 20, 
                y: ship.centerY + Math.sin(ship.angle) * 20, 
                vx: Math.cos(ship.angle) * 450, 
                vy: Math.sin(ship.angle) * 450
            });
        }

        // 6. Lógica do Jogo (Update)
        function update(dt) {
            if (gameWon) return; // Trava o jogo apos vitoria

            if (pressedKeys[KEY_LEFT]) ship.angle -= ship.speed * dt;
            if (pressedKeys[KEY_RIGHT]) ship.angle += ship.speed * dt;

            tempo += dt;

            // Movimentar inimigos em órbita
            invaders.forEach(inv => {
                if (inv.alive) {
                    const layer = layers[inv.layerIdx];
                    let currentAngle = tempo * layer.speed + inv.angleOffset;
                    inv.x = ship.centerX + Math.cos(currentAngle) * layer.radius;
                    inv.y = ship.centerY + Math.sin(currentAngle) * layer.radius;
                }
            });

            // Processar tiros e colisões
            for (let i = rockets.length - 1; i >= 0; i--) {
                let r = rockets[i];
                r.x += r.vx * dt;
                r.y += r.vy * dt;

                if (r.x < 0 || r.x > LOGICAL_WIDTH || r.y < 0 || r.y > LOGICAL_HEIGHT) {
                    rockets.splice(i, 1);
                    continue;
                }

                for (let j = 0; j < invaders.length; j++) {
                    let inv = invaders[j];
                    if (inv.alive) {
                        let dx = r.x - inv.x;
                        let dy = r.y - inv.y;
                        if ((dx * dx + dy * dy) < 200) { 
                            inv.health--;
                            if (inv.health <= 0) inv.alive = false;
                            rockets.splice(i, 1);
                            break; 
                        }
                    }
                }
            }

            // Checar se todos morreram
            const totalAlive = invaders.filter(inv => inv.alive).length;
            if (totalAlive === 0) gameWon = true;
        }

        function getInvaderColor(health) {
            const colors = { 4: '#FF00FF', 3: '#00FFFF', 2: '#00FF00', 1: '#FFFF00' };
            return colors[health] || '#FFF';
        }

        // 7. Renderização (Draw)
        function draw() {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.scale(scale, scale);

            // Desenhar Estrelas
            stars.forEach(s => {
                let opacity = 0.3 + Math.abs(Math.sin(tempo * s.blinkSpeed)) * 0.7;
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });

            // Desenhar Nave
            ctx.save();

            ctx.translate(ship.centerX, ship.centerY);
            ctx.rotate(ship.angle);

            ctx.fillStyle = '#00CCFF';

            ctx.beginPath();
            ctx.moveTo(15, 0); ctx.lineTo(-10, -10); ctx.lineTo(-10, 10);
            ctx.closePath(); ctx.fill();

            ctx.fillStyle = '#FFF';
            ctx.fillRect(10, -2, 10, 4);
            ctx.restore();

            // Desenhar Inimigos
            invaders.forEach(inv => {
              
                
                if (inv.alive) {
                    ctx.save();
                    ctx.translate(inv.x, inv.y);

                    let pulso = 1 + 0.1 * Math.sin(tempo * 5); 
                    ctx.scale(pulso, pulso); 
        
                    let angleToCenter = Math.atan2(ship.centerY - inv.y, ship.centerX - inv.x);
                    ctx.rotate(angleToCenter + Math.PI/2);
        
                    ctx.fillStyle = getInvaderColor(inv.health);
                    ctx.fillRect(-inv.width/2, -inv.height/2, inv.width, inv.height);


                    ctx.fillStyle = "black";
                    ctx.font = "bold 10px Arial";
                    ctx.textAlign = "center";
                    ctx.fillText(inv.health, 0, 4);
                    ctx.restore();
                }
            });

            // Desenhar Tiros
            ctx.fillStyle = '#FF4444';
            rockets.forEach(r => {
                ctx.beginPath();
                ctx.arc(r.x, r.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            // Tela de Vitória
            if (gameWon) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);
                ctx.textAlign = "center";
                ctx.fillStyle = '#00FFFF';
                ctx.font = "bold 45px Courier New";
                ctx.fillText("MISSÃO CUMPRIDA", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2);
                ctx.fillStyle = '#FFF';
                ctx.font = "18px Arial";
                ctx.fillText("Você eliminou a ameaça invasora!", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 40);
                ctx.font = "14px Arial";
                ctx.fillText("Pressione F5 para reiniciar", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 80);
            }
        }

        // 8. Loop Principal
        let lastTime = performance.now();
        function gameLoop(currentTime) {
            let dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            update(dt);
            draw();
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
