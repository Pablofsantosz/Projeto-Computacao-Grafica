<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Space Invaders - 360 Graus & Multicamadas</title>
    <style>
        body { background-color: #111; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background-color: #000; border: 2px solid #333; box-shadow: 0 0 20px rgba(0,255,255,0.1); }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // independente do tamanho da janela ela ficara travada em uma resolucao
        const LOGICAL_WIDTH = 600;
        const LOGICAL_HEIGHT = 600;

        const KEY_LEFT = 37, KEY_RIGHT = 39, KEY_SPACE = 32;
        let pressedKeys = {};
        let rockets = [];
        let tempo = 0; 
        
        // Geração das estrelas para o fundo
        let stars = [];
        for (let i = 0; i < 80; i++) {
            stars.push({
                x: Math.random() * LOGICAL_WIDTH,
                y: Math.random() * LOGICAL_HEIGHT,
                size: Math.random() * 1.5,
                blinkSpeed: 1 + Math.random() * 3
            });
        }

        // Nave centralizada
        const ship = {
            centerX: LOGICAL_WIDTH / 2,
            centerY: LOGICAL_HEIGHT / 2,
            angle: 0, // rotacao da nave
            radius: 20, // Ajustado para o tiro sair da ponta
            width: 20,
            height: 15,
            speed: 4 //rotacao
        };

        let invaders = [];
        const layers = [
            { count: 8, radius: 120, speed: 0.5, colorShift: 0 },
            { count: 12, radius: 190, speed: -0.3, colorShift: 1 },
            { count: 16, radius: 260, speed: 0.2, colorShift: 2 }
        ];

        // multicamadas de inimigos 
        layers.forEach((layer, layerIdx) => {
            for (let i = 0; i < layer.count; i++) {
                invaders.push({
                    layerIdx: layerIdx,
                    angleOffset: (i * (Math.PI * 2 / layer.count)),
                    x: 0, 
                    y: 0, 
                    width: 20,
                    height: 18,
                    health: 4 - layerIdx, 
                    alive: true
                });
            }
        });

        let scale = 1;
        function resize() {
            const scaleX = window.innerWidth / LOGICAL_WIDTH;
            const scaleY = window.innerHeight / LOGICAL_HEIGHT;
            scale = Math.min(scaleX, scaleY);
            canvas.width = LOGICAL_WIDTH * scale;
            canvas.height = LOGICAL_HEIGHT * scale;
        }

        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('keydown', e => pressedKeys[e.keyCode] = true);
        window.addEventListener('keyup', e => {
            if (e.keyCode === KEY_SPACE) fireRocket();
            delete pressedKeys[e.keyCode];
        });

        function fireRocket() {
            // tiro sai e vai mirado - Ajustado para sair da ponta do canhão
            rockets.push({ 
                x: ship.centerX + Math.cos(ship.angle) * 20, 
                y: ship.centerY + Math.sin(ship.angle) * 20, 
                // Velocidade aumentada para fluidez
                vx: Math.cos(ship.angle) * 400, 
                vy: Math.sin(ship.angle) * 400
            });
        }

        function update(dt) {
            // Movimento circular da nave 
            if (pressedKeys[KEY_LEFT]) ship.angle -= ship.speed * dt;
            if (pressedKeys[KEY_RIGHT]) ship.angle += ship.speed * dt;

            tempo += dt;

            //  inimigos 360
            invaders.forEach(inv => {
                if (inv.alive) {
                    const layer = layers[inv.layerIdx];
                    let currentAngle = tempo * layer.speed + inv.angleOffset;
                    
                    inv.x = ship.centerX + Math.cos(currentAngle) * layer.radius;
                    inv.y = ship.centerY + Math.sin(currentAngle) * layer.radius;
                }
            });

            // Atualiza tiros e checa colisão
            for (let i = rockets.length - 1; i >= 0; i--) {
                let r = rockets[i];
                r.x += r.vx * dt;
                r.y += r.vy * dt;

                // Remove tiros fora da tela
                if (r.x < 0 || r.x > LOGICAL_WIDTH || r.y < 0 || r.y > LOGICAL_HEIGHT) {
                    rockets.splice(i, 1);
                    continue;
                }

                // Lógica de quebrar os quadradinhos e colisão
                for (let j = 0; j < invaders.length; j++) {
                    let inv = invaders[j];
                    if (inv.alive) {
                        let dx = r.x - inv.x;
                        let dy = r.y - inv.y;
                        let distanceSq = dx * dx + dy * dy;
                        
                        
                        if (distanceSq < 200) { 
                            inv.health--;
                            if (inv.health <= 0) inv.alive = false;
                            rockets.splice(i, 1); // Remove o tiro ao impactar
                            break; 
                        }
                    }
                }
            }
        }

        function getInvaderColor(health) {
            const colors = { 4: '#FF00FF', 3: '#00FFFF', 2: '#00FF00', 1: '#FFFF00' };
            return colors[health] || '#FFF';
        }

        function draw() {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.scale(scale, scale);

            //estrelas ao fundo
            stars.forEach(s => {
                let opacity = 0.3 + Math.abs(Math.sin(tempo * s.blinkSpeed)) * 0.7;
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });

            // Desenha a Nave no Centro 
            ctx.save();
            ctx.translate(ship.centerX, ship.centerY);
            ctx.rotate(ship.angle);
            // Corpo da nave
            ctx.fillStyle = '#00CCFF';
            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(-10, -10);
            ctx.lineTo(-10, 10);
            ctx.closePath();
            ctx.fill();
            // Canhão
            ctx.fillStyle = '#FFF';
            ctx.fillRect(10, -2, 10, 4);
            ctx.restore();

            // Inimigos 
            invaders.forEach(inv => {
                if (inv.alive) {
                    ctx.save();
                    ctx.translate(inv.x, inv.y);
                    
                    let angleToCenter = Math.atan2(ship.centerY - inv.y, ship.centerX - inv.x);
                    ctx.rotate(angleToCenter + Math.PI/2);

                    ctx.fillStyle = getInvaderColor(inv.health);
                    ctx.fillRect(-inv.width/2, -inv.height/2, inv.width, inv.height);
                    
                    // Vida
                    ctx.fillStyle = "black";
                    ctx.font = "bold 10px Arial";
                    ctx.textAlign = "center";
                    ctx.fillText(inv.health, 0, 4);
                    ctx.restore();
                }
            });

            // Tiros 
            rockets.forEach(r => {
                ctx.fillStyle = '#FF4444';
                ctx.beginPath();
                ctx.arc(r.x, r.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        let lastTime = performance.now();
        function gameLoop(currentTime) {
            let dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            update(dt);
            draw();
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
