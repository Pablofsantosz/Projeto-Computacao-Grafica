<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Space Invaders - Tela Cheia CG</title>
    <style>
        body { 
            background-color: #222; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: white; 
            font-family: 'Courier New', Courier, monospace; 
        }
        canvas { 
            background-color: #000; 
            display: block;
        }
        .hud { 
            position: absolute; 
            top: 20px; 
            width: 100%; 
            text-align: center; 
            pointer-events: none; 
            text-shadow: 2px 2px 4px #000;
            font-weight: bold;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="hud">
        Use ◄ ► e ESPAÇO para jogar | Computação Gráfica: Transformações 2D
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const KEY_LEFT = 37, KEY_RIGHT = 39, KEY_SPACE = 32;
        let pressedKeys = {};
        let rockets = [];
        let tempo = 0; 
        let invaders = [];

        const ship = {
            x: 0,
            y: 0,
            width: 30,
            height: 20,
            speed: 500 // Velocidade proporcional para telas maiores
        };

        
        const rows = 5; 
        const cols = 11;
        const spacingX = 60;
        const spacingY = 45;

        function initGame() {
            // Ajusta o tamanho do canvas para o tamanho da janela
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            
            ship.x = canvas.width / 2;
            ship.y = canvas.height - 50;

            
            invaders = [];
            const groupWidth = (cols - 1) * spacingX;
            const startX = (canvas.width - groupWidth) / 2;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let randomHealth = Math.floor(Math.random() * 4) + 1;
                    invaders.push({
                        x: startX + (c * spacingX),
                        y: 80 + (r * spacingY),
                        width: 35,
                        height: 25,
                        health: randomHealth,
                        alive: true
                    });
                }
            }
        }

        // Redimensionar 
        window.addEventListener('resize', initGame);

        window.addEventListener('keydown', e => pressedKeys[e.keyCode] = true);
        window.addEventListener('keyup', e => {
            if (e.keyCode === KEY_SPACE) fireRocket();
            delete pressedKeys[e.keyCode];
        });

        function fireRocket() {
            rockets.push({ x: ship.x, y: ship.y - 15, speed: 600 });
        }

        function update(dt) {
            // Movimento 
            if (pressedKeys[KEY_LEFT] && ship.x > ship.width) ship.x -= ship.speed * dt;
            if (pressedKeys[KEY_RIGHT] && ship.x < canvas.width - ship.width) ship.x += ship.speed * dt;

            
            for (let i = 0; i < rockets.length; i++) {
                let r = rockets[i];
                r.y -= r.speed * dt;

                if (r.y < 0) {
                    rockets.splice(i, 1);
                    i--;
                    continue;
                }

                // Colisão 
                for (let j = 0; j < invaders.length; j++) {
                    let inv = invaders[j];
                    if (inv.alive &&
                        r.x > inv.x - inv.width/2 && r.x < inv.x + inv.width/2 &&
                        r.y > inv.y - inv.height/2 && r.y < inv.y + inv.height/2) {
                        
                        inv.health -= 1; 
                        if (inv.health <= 0) inv.alive = false;
                        rockets.splice(i, 1);
                        i--;
                        break; 
                    }
                }
            }
        }

        function getInvaderColor(health) {
            switch(health) {
                case 4: return '#4B0082'; 
                case 3: return '#1E90FF'; 
                case 2: return '#32CD32'; 
                case 1: return '#ADFF2F'; 
                default: return '#FFF';
            }
        }

        function draw() {
            
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            tempo += 0.05;

           
            ctx.save(); 
            ctx.translate(ship.x, ship.y);
            ctx.fillStyle = '#00FFFF'; 
            ctx.fillRect(-ship.width/2, -ship.height/2, ship.width, ship.height);
            
            ctx.fillStyle = '#FFF';
            ctx.fillRect(-4, -ship.height, 8, 10);
            ctx.restore(); 

            
            invaders.forEach(inv => {
                if (inv.alive) {
                    ctx.save();
                    
                    
                    ctx.translate(inv.x, inv.y);
                    
                    let anguloInimigo = Math.sin(tempo * 2) * 0.15;
                    ctx.rotate(anguloInimigo);
                    
                    let pulso = 1 + 0.1 * Math.sin(tempo * 1.5);
                    ctx.scale(pulso, pulso);

                    
                    ctx.fillStyle = getInvaderColor(inv.health);
                    ctx.fillRect(-inv.width/2, -inv.height/2, inv.width, inv.height);
                    
                    
                    ctx.fillStyle = "white";
                    ctx.font = "bold 14px Arial";
                    ctx.textAlign = "center";
                    ctx.fillText(inv.health, 0, 5);
                    
                    ctx.restore();
                }
            });

            
            ctx.fillStyle = '#FF3333';
            rockets.forEach(r => {
                ctx.save();
                ctx.translate(r.x, r.y);
                ctx.fillRect(-2, 0, 4, 12);
                ctx.restore();
            });
        }

        let lastTime = performance.now();
        function gameLoop(currentTime) {
            let dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            
            update(dt);
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Inicialização
        initGame();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
